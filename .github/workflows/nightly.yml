name: Nightly Data Migration

on:
  schedule:
    # 10:00 UTC daily = midnight HST (Hawaii is UTC-10, no DST)
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which migrations to run'
        required: true
        default: 'default'
        type: choice
        options:
          - default     # _run_nightly.py default set (007-033)
          - all         # all migrations 001-033
          - grow_only   # grow-related only (024-032)
      skip_clear:
        description: 'Skip the TRUNCATE pre-clear step'
        required: false
        default: false
        type: boolean

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      # Optional overrides — scripts have hardcoded defaults for production.
      # Only set the repo Variables below if you want to point a run at a
      # different audit user or org (e.g. for a sandbox). Sheet IDs are all
      # hardcoded inside each migration script and do not have env overrides.
      MIGRATION_AUDIT_USER: ${{ vars.MIGRATION_AUDIT_USER }}
      MIGRATION_ORG_ID: ${{ vars.MIGRATION_ORG_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Google service account credentials
        env:
          CREDS: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          printf '%s' "$CREDS" > credentials.json
          python -c "import json; json.load(open('credentials.json'))" && echo "credentials.json is valid JSON"

      - name: Pre-clear transactional tables
        if: ${{ inputs.skip_clear != true }}
        run: python migrations/_clear_transactional.py

      - name: Run migrations (default set)
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'default' || inputs.mode == '' }}
        run: python migrations/_run_nightly.py

      - name: Run migrations (all)
        if: ${{ inputs.mode == 'all' }}
        run: python migrations/_run_nightly.py --all

      - name: Run migrations (grow only)
        if: ${{ inputs.mode == 'grow_only' }}
        run: python migrations/_run_nightly.py --only 024,025,026,027,028,029,030,031,032

      - name: Cleanup credentials on failure
        if: ${{ always() }}
        run: rm -f credentials.json

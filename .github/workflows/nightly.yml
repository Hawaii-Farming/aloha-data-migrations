name: Nightly Data Migration

# Schedule (cron) runs against BOTH dev and prod. Manual dispatch can
# override via the target input (dev / prod / both).

on:
  schedule:
    # 10:00 UTC daily = midnight HST (Hawaii is UTC-10, no DST)
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which Supabase project to run against'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
          - both
      mode:
        description: 'Which migrations to run'
        required: true
        default: 'default'
        type: choice
        options:
          - default     # _run_nightly.py default set (003-035)
          - all         # all migrations 001-035
          - grow_only   # grow-related only (024-033)
          - only        # run exactly the scripts in `only_list` input
      only_list:
        description: 'Comma-sep migration numbers when mode=only (e.g. "005" or "003,004,005")'
        required: false
        default: ''
        type: string
      skip_clear:
        description: 'Skip the TRUNCATE pre-clear step'
        required: false
        default: false
        type: boolean

jobs:
  migrate-dev:
    if: ${{ github.event_name == 'schedule' || inputs.target == 'dev' || inputs.target == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      MIGRATION_AUDIT_USER: ${{ vars.MIGRATION_AUDIT_USER }}
      MIGRATION_ORG_ID: ${{ vars.MIGRATION_ORG_ID }}
      INTUIT_CLIENT_ID: ${{ secrets.INTUIT_CLIENT_ID }}
      INTUIT_CLIENT_SECRET: ${{ secrets.INTUIT_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Google service account credentials
        env:
          CREDS: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          printf '%s' "$CREDS" > credentials.json
          python -c "import json; json.load(open('credentials.json'))" && echo "credentials.json is valid JSON"

      - name: Pre-clear transactional tables
        if: ${{ inputs.skip_clear != true }}
        run: python gsheets/migrations/_clear_transactional.py

      - name: Run migrations (default set)
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'default' || inputs.mode == '' }}
        run: python gsheets/migrations/_run_nightly.py

      - name: Run migrations (all)
        if: ${{ inputs.mode == 'all' }}
        run: python gsheets/migrations/_run_nightly.py --all

      - name: Run migrations (grow only)
        if: ${{ inputs.mode == 'grow_only' }}
        run: python gsheets/migrations/_run_nightly.py --only 024,025,026,027,028,029,030,031,032,033

      - name: Run migrations (custom only list)
        if: ${{ inputs.mode == 'only' && inputs.only_list != '' }}
        run: python gsheets/migrations/_run_nightly.py --only ${{ inputs.only_list }}

      - name: Cleanup credentials on failure
        if: ${{ always() }}
        run: rm -f credentials.json

  migrate-prod:
    if: ${{ github.event_name == 'schedule' || inputs.target == 'prod' || inputs.target == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL_PROD }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_KEY_PROD }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_PROD }}
      MIGRATION_AUDIT_USER: ${{ vars.MIGRATION_AUDIT_USER }}
      MIGRATION_ORG_ID: ${{ vars.MIGRATION_ORG_ID }}
      INTUIT_CLIENT_ID: ${{ secrets.INTUIT_CLIENT_ID }}
      INTUIT_CLIENT_SECRET: ${{ secrets.INTUIT_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Google service account credentials
        env:
          CREDS: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          printf '%s' "$CREDS" > credentials.json
          python -c "import json; json.load(open('credentials.json'))" && echo "credentials.json is valid JSON"

      - name: Pre-clear transactional tables
        if: ${{ inputs.skip_clear != true }}
        run: python gsheets/migrations/_clear_transactional.py

      - name: Run migrations (default set)
        if: ${{ inputs.mode == 'default' || inputs.mode == '' }}
        run: python gsheets/migrations/_run_nightly.py

      - name: Run migrations (all)
        if: ${{ inputs.mode == 'all' }}
        run: python gsheets/migrations/_run_nightly.py --all

      - name: Run migrations (grow only)
        if: ${{ inputs.mode == 'grow_only' }}
        run: python gsheets/migrations/_run_nightly.py --only 024,025,026,027,028,029,030,031,032,033

      - name: Run migrations (custom only list)
        if: ${{ inputs.mode == 'only' && inputs.only_list != '' }}
        run: python gsheets/migrations/_run_nightly.py --only ${{ inputs.only_list }}

      - name: Cleanup credentials on failure
        if: ${{ always() }}
        run: rm -f credentials.json

name: Pull Prod Drift (one-shot)

# Manual-trigger sibling of sync-dev-to-prod.yml. Reads prod's
# supabase_migrations.schema_migrations directly via psycopg2 and writes
# the SOURCE SQL of any prod-only migration version to a
# `<version>_recovered_from_prod_<name>.sql` file in supabase/migrations/.
#
# Why this shape rather than `supabase db pull`:
#   * db pull refuses to run when local and remote migration histories
#     diverge (catch-22 with the original problem).
#   * It also only captures schema state, not the original statements --
#     if someone ran an INSERT/UPDATE via Studio, db pull misses it.
#   * The recovery script reads schema_migrations.statements directly,
#     preserving exact SQL.
#
# After this workflow runs, review the recovered files, rename them to
# something descriptive, and edit if needed. Then a normal deploy-schema
# run unblocks because prod's schema_migrations matches the repo.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PROD_DB_URL: ${{ secrets.SUPABASE_DB_URL_PROD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Recover prod-only migration files
        run: python scripts/recover_prod_migrations.py

      - name: Show captured files
        run: |
          echo "=== Captured files ==="
          ls -la supabase/migrations/*_recovered_from_prod_*.sql 2>/dev/null || echo "(none)"
          echo
          echo "=== Diff summary ==="
          git status --short supabase/migrations/

      - name: Commit recovered files
        run: |
          if [ -z "$(git status --short supabase/migrations/)" ]; then
            echo "Nothing to commit."
            exit 0
          fi
          git add supabase/migrations/*_recovered_from_prod_*.sql
          git commit -m "$(cat <<'EOF'
          chore(schema): recover prod-only migration files via pull-prod-drift

          Recovered the source SQL of any migration version present on
          prod (in supabase_migrations.schema_migrations.statements) but
          absent from this repo. Files are named *_recovered_from_prod_*
          and should be reviewed, renamed, and edited as needed before
          being treated as permanent.

          Captured by .github/workflows/pull-prod-drift.yml +
          scripts/recover_prod_migrations.py.
          EOF
          )"
          git push origin main

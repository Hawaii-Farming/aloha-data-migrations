name: Reset Auth Password (one-shot)

# Looks up an auth.users row by email and resets its password. Useful
# for unsticking team members locked out of dev/prod without going
# through the email-recovery flow.
#
# Heads-up: the password is taken as a workflow_dispatch input. Inputs
# are NOT auto-masked in workflow logs, so anyone with repo access can
# see it in the run UI. Treat as a one-shot, throwaway value; have the
# user change it after signing in.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which Supabase project to reset against'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod, both]
      email:
        description: 'Email of the account to reset'
        required: true
        type: string
      password:
        description: 'New password'
        required: true
        type: string

jobs:
  reset-dev:
    if: ${{ inputs.target == 'dev' || inputs.target == 'both' }}
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      RESET_EMAIL: ${{ inputs.email }}
      RESET_PASSWORD: ${{ inputs.password }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: python scripts/reset_auth_password.py

  reset-prod:
    if: ${{ inputs.target == 'prod' || inputs.target == 'both' }}
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL_PROD }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_KEY_PROD }}
      RESET_EMAIL: ${{ inputs.email }}
      RESET_PASSWORD: ${{ inputs.password }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: python scripts/reset_auth_password.py

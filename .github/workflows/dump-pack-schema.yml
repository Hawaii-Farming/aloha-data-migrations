name: Dump Pack Schema (one-shot)

# pg_dump --schema-only of every public table whose name starts with
# pack_, plus the pack_session_summary_v view. Writes the output to
# docs/schema/pack_current_dump.sql and commits.
#
# Used as the reference for the pack-module consolidation rewrite --
# several pack tables exist on dev but have no committed CREATE
# migration (pack_moisture, pack_session_cases/fails/labor_hour,
# pack_fail_category) so this dump is the source of truth.
#
# Reads dev (not prod) because dev has the newest pack_session-model
# schema; prod is still on the older pack_lot/pack_productivity shape
# and is the laggard.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      DEV_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      DEV_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Link dev project
        env:
          SUPABASE_DB_PASSWORD: ${{ env.DEV_DB_PASSWORD }}
        run: supabase link --project-ref "$DEV_PROJECT_REF"

      - name: Dump pack_* schema from dev
        env:
          SUPABASE_DB_PASSWORD: ${{ env.DEV_DB_PASSWORD }}
        run: |
          mkdir -p docs/schema
          # Use supabase db dump (bundles a server-version-matched
          # pg_dump). Save the full public-schema dump to the repo;
          # the consolidation pass that follows reads pack_* sections
          # out of this file.
          supabase db dump --linked --schema public \
            > docs/schema/dev_public_dump.sql

          echo "=== total byte count ==="
          wc -c docs/schema/dev_public_dump.sql
          echo "=== first 30 lines ==="
          head -30 docs/schema/dev_public_dump.sql
          echo "=== pack_ mentions ==="
          grep -c "pack_" docs/schema/dev_public_dump.sql || true

      - name: Commit dump
        run: |
          git add docs/schema/dev_public_dump.sql
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "$(cat <<'EOF'
          chore(schema): capture current dev public-schema dump

          Full supabase db dump --schema public from dev. Reference file
          for the pack-module consolidation rewrite (pack_* sections
          are carved out by hand in the rewrite); not a migration.
          EOF
          )"
          git push origin main

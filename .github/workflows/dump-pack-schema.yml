name: Dump Pack Schema (one-shot)

# pg_dump --schema-only of every public table whose name starts with
# pack_, plus the pack_session_summary_v view. Writes the output to
# docs/schema/pack_current_dump.sql and commits.
#
# Used as the reference for the pack-module consolidation rewrite --
# several pack tables exist on dev but have no committed CREATE
# migration (pack_moisture, pack_session_cases/fails/labor_hour,
# pack_fail_category) so this dump is the source of truth.
#
# Reads dev (not prod) because dev has the newest pack_session-model
# schema; prod is still on the older pack_lot/pack_productivity shape
# and is the laggard.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      DEV_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      DEV_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Link dev project
        env:
          SUPABASE_DB_PASSWORD: ${{ env.DEV_DB_PASSWORD }}
        run: supabase link --project-ref "$DEV_PROJECT_REF"

      - name: Dump pack_* schema from dev
        env:
          SUPABASE_DB_PASSWORD: ${{ env.DEV_DB_PASSWORD }}
        run: |
          mkdir -p docs/schema
          # Use supabase db dump (bundles a server-version-matched
          # pg_dump). --schema public dumps everything in public; we
          # post-filter to pack_* with awk to keep output focused.
          supabase db dump --linked --schema public > /tmp/full_public_dump.sql

          # Carve out only the pack_* sections. pg_dump groups blocks
          # by object with `-- Name: <obj>; Type: ...` headers; awk on
          # those headers, emit the block if the object name starts with
          # "pack_".
          awk '
            /^-- Name: pack_/ { keep = 1; print; next }
            /^-- Name: / { keep = 0 }
            keep { print }
          ' /tmp/full_public_dump.sql > docs/schema/pack_current_dump.sql

          echo "=== dump byte count ==="
          wc -c docs/schema/pack_current_dump.sql
          echo "=== first 20 lines ==="
          head -20 docs/schema/pack_current_dump.sql
          echo "=== objects captured ==="
          grep -c '^-- Name: pack_' docs/schema/pack_current_dump.sql || true

      - name: Commit dump
        run: |
          if git diff --quiet docs/schema/pack_current_dump.sql; then
            echo "No changes to commit."
            exit 0
          fi
          git add docs/schema/pack_current_dump.sql
          git commit -m "$(cat <<'EOF'
          chore(schema): capture current dev pack schema for consolidation

          pg_dump --schema-only of every public.pack_* table + the
          pack_session_summary_v view, sourced from dev (which carries
          the newest pack_session-model schema). Reference file for the
          pack-module consolidation rewrite; not a migration.
          EOF
          )"
          git push origin main

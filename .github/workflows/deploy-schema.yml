name: Deploy Supabase Schema

on:
  # Auto-deploy on push is temporarily disabled while the schema is being
  # refactored (file renames + ALTER/CREATE consolidation). Re-enable by
  # restoring the `push:` block below after the refactor is cut over.
  # push:
  #   branches: [main]
  #   paths:
  #     - 'supabase/migrations/**'
  #     - 'supabase/config.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push migrations
        run: supabase db push

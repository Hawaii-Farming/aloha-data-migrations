name: Deploy Supabase Schema

on:
  # Auto-deploy on push is disabled while the schema is in active
  # development. The DB is being edited directly during experimentation
  # (Dashboard SQL Editor / psycopg2), and `supabase db push` errors out
  # whenever remote `schema_migrations` drifts from local files. Trigger
  # the deploy manually via the Actions tab when the repo and remote
  # are intentionally aligned. Re-enable the push trigger by uncommenting
  # the block below once the schema stabilizes.
  #
  # push:
  #   branches: [main]
  #   paths:
  #     - 'supabase/migrations/**'
  #     - 'supabase/config.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push migrations
        run: supabase db push
